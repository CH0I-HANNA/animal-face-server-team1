services:
  app:
    build: .
    container_name: animalface-app
    ports:
      - "8081:8081"
    env_file:
      - .env
    environment:
      DB_URL: jdbc:mysql://db:3306/animalFace?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  db:
    image: mysql:8.0
    container_name: animalface-db
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: animalFace
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

volumes:
  mysql-data:
